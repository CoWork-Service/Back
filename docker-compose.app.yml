services:
  app:
    image: eclipse-temurin:17-jre
    container_name: ${APP_CONTAINER_NAME:-cowork-backend}
    depends_on:
      - mysql
    working_dir: /app
    command: ["java", "-jar", "/app/app.jar"]
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx384m -XX:+UseSerialGC}

      # Spring이 MySQL 컨테이너로 붙도록
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-3}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-1}

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    expose:
      - "8080"
    volumes:
      - ./build/libs/app.jar:/app/app.jar:ro
      - ./.env:/app/.env:ro
      - app_uploads:/app/uploads
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: ${CADDY_CONTAINER_NAME:-cowork-caddy}
    depends_on:
      - app
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  app_uploads:
  caddy_data:
  caddy_config:
