name: Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ec2
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/cowork/backend
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
  BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
  FILE_STORAGE_TYPE: ${{ secrets.FILE_STORAGE_TYPE }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment secrets
        id: deployment_secrets
        shell: bash
        run: |
          missing=()
          if [ -z "$EC2_HOST" ]; then missing+=("EC2_HOST"); fi
          if [ -z "$EC2_USER" ]; then missing+=("EC2_USER"); fi
          if [ -z "$EC2_SSH_KEY" ]; then missing+=("EC2_SSH_KEY"); fi
          if [ -z "$BACKEND_ENV" ]; then missing+=("BACKEND_ENV"); fi
          if [ -z "$FILE_STORAGE_TYPE" ]; then missing+=("FILE_STORAGE_TYPE"); fi
          if [ -z "$AWS_REGION" ]; then missing+=("AWS_REGION"); fi
          if [ -z "$AWS_S3_BUCKET" ]; then missing+=("AWS_S3_BUCKET"); fi
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then missing+=("AWS_ACCESS_KEY_ID"); fi
          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then missing+=("AWS_SECRET_ACCESS_KEY"); fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::Skipping EC2 deployment. Missing secrets: ${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.deployment_secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Java
        if: steps.deployment_secrets.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build boot jar
        if: steps.deployment_secrets.outputs.ready == 'true'
        run: ./gradlew bootJar --no-daemon

      - name: Prepare deployment bundle
        if: steps.deployment_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          rm -rf deploy
          mkdir -p deploy/build/libs
          cp Dockerfile docker-compose.yml docker-compose.app.yml Caddyfile deploy/
          cp build/libs/*.jar deploy/build/libs/app.jar
          {
            printf '%s\n' "$BACKEND_ENV"
            printf 'FILE_STORAGE_TYPE=%s\n' "$FILE_STORAGE_TYPE"
            printf 'AWS_REGION=%s\n' "$AWS_REGION"
            printf 'AWS_S3_BUCKET=%s\n' "$AWS_S3_BUCKET"
            printf 'AWS_ACCESS_KEY_ID=%s\n' "$AWS_ACCESS_KEY_ID"
            printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$AWS_SECRET_ACCESS_KEY"
          } > deploy/.env

      - name: Setup SSH key
        if: steps.deployment_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_KEY" > ~/.ssh/cowork-backend-key.pem
          chmod 600 ~/.ssh/cowork-backend-key.pem
          ssh-keyscan -T 30 -H "$EC2_HOST" >> ~/.ssh/known_hosts || true

      - name: Bootstrap EC2 host
        if: steps.deployment_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          for attempt in {1..5}; do
            if ssh -i ~/.ssh/cowork-backend-key.pem \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=45 \
              "$EC2_USER@$EC2_HOST" << 'EOF'
            set -euo pipefail

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME}) stable" | sudo tee /etc/apt/sources.list.d/docker.list >/dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker "$USER" || true
            fi

            if ! command -v rsync >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y rsync
            fi

            if [ ! -f /swapfile ]; then
              sudo fallocate -l 1G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=1024
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
            fi
            if ! swapon --show | grep -q '/swapfile'; then
              sudo swapon /swapfile
            fi
            if ! grep -q '^/swapfile ' /etc/fstab; then
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab >/dev/null
            fi

            sudo mkdir -p /opt/cowork/backend
            sudo chown -R "$USER:$USER" /opt/cowork
          EOF
            then
              exit 0
            fi
            echo "SSH bootstrap attempt ${attempt} failed; retrying..."
            sleep 20
          done
          exit 1

      - name: Upload deployment bundle
        if: steps.deployment_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          for attempt in {1..5}; do
            if rsync -az --delete \
              -e "ssh -i ~/.ssh/cowork-backend-key.pem -o StrictHostKeyChecking=accept-new -o ConnectTimeout=45" \
              deploy/ "$EC2_USER@$EC2_HOST:$DEPLOY_PATH/"; then
              exit 0
            fi
            echo "rsync attempt ${attempt} failed; retrying..."
            sleep 20
          done
          exit 1

      - name: Restart backend
        if: steps.deployment_secrets.outputs.ready == 'true'
        timeout-minutes: 8
        shell: bash
        run: |
          for attempt in {1..5}; do
            if ssh -i ~/.ssh/cowork-backend-key.pem \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=45 \
              "$EC2_USER@$EC2_HOST" << EOF
            set -euo pipefail
            cd "$DEPLOY_PATH"
            sudo docker compose -f docker-compose.yml -f docker-compose.app.yml up -d
            sudo docker image prune -f
            sudo docker compose -f docker-compose.yml -f docker-compose.app.yml ps
          EOF
            then
              exit 0
            fi
            echo "backend restart attempt ${attempt} failed; retrying..."
            sleep 20
          done
          exit 1
