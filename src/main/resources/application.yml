spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    time-zone: UTC

file:
  storage:
    type: ${FILE_STORAGE_TYPE:local}
    base-path: ${FILE_STORAGE_BASE_PATH:./uploads}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_REGION:ap-northeast-2}
      key-prefix: ${AWS_S3_KEY_PREFIX:}

clova:
  ocr:
    secret-key: ${CLOVA_OCR_SECRET_KEY:}
    invoke-url: ${CLOVA_OCR_INVOKE_URL:}

jwt:
  secret: ${JWT_SECRET:cowork-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800}

auth:
  cookie:
    access-name: ${AUTH_ACCESS_COOKIE_NAME:cowork_access_token}
    refresh-name: ${AUTH_REFRESH_COOKIE_NAME:cowork_refresh_token}
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    domain: ${AUTH_COOKIE_DOMAIN:}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

logging:
  level:
    org.springframework.boot.context.config: DEBUG

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  sso-temp-token-expiry: ${SSO_TEMP_TOKEN_EXPIRY:300}
  sso-allow-unverified-fallback: ${SSO_ALLOW_UNVERIFIED_FALLBACK:false}
